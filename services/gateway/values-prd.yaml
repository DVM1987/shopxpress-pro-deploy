# Prd override — manual PR promotion from stg, requires devops review.

replicas: 0

upstreams:
  productsUrl: http://products-prd:80
  ordersUrl: http://orders-prd:80

ingress:
  groupOrder: 32
  host: gateway-prd.shopxpress-pro.do2602.click

resources:
  requests:
    cpu: 200m
    memory: 256Mi
  limits:
    cpu: 1000m
    memory: 1Gi

strategy:
  rollingUpdate:
    maxSurge: 1
    maxUnavailable: 0
