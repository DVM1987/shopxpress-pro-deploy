# Base defaults for orders microservice. Per-env files override only diverging keys.

replicas: 1

image:
  repository: 527055790396.dkr.ecr.ap-southeast-1.amazonaws.com/shopxpress-pro-orders
  tag: latest                          # bot bumps this in values-dev.yaml only
  pullPolicy: IfNotPresent

service:
  port: 80
  targetPort: 8080

containerPort: 8080

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 200m
    memory: 256Mi

probes:
  liveness:
    path: /healthz
    initialDelaySeconds: 5
    periodSeconds: 10
  readiness:
    path: /readyz
    initialDelaySeconds: 3
    periodSeconds: 5

serviceAccount:
  create: true
  name: ""

# Internal microservice — no Internet-facing Ingress.
ingress:
  enabled: false

# Postgres-backed (orders + order_items in 2-table transaction).
externalSecret:
  enabled: true
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  targetSecretName: orders-db-secret
  awsSecretPath: shopxpress-pro/dev/orders-db
  envKey: DATABASE_URL

# Migration Job — golang-migrate CLI, idempotent. ArgoCD sync-wave -1
# (sau ExternalSecret -2, trước Deployment 0). SQL files load từ
# files/migrations/*.sql qua ConfigMap.
migration:
  enabled: true
  image:
    repository: migrate/migrate
    tag: v4.18.1

strategy:
  type: RollingUpdate
  rollingUpdate:
    maxSurge: 25%
    maxUnavailable: 0

terminationGracePeriodSeconds: 30
