{{- if .Values.externalSecret.enabled }}
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ include "lib.fullname" . }}
  labels: {{- include "lib.labels" . | nindent 4 }}
  annotations:
    # Wave -2: apply trước Migration Job (-1) và Deployment (0).
    # ESO controller sync K8s Secret từ AWS SM ngay sau apply (~10s),
    # kubelet sẽ retry mount Secret cho Job ở wave -1 nếu chưa kịp.
    argocd.argoproj.io/sync-wave: "-2"
spec:
  refreshInterval: {{ .Values.externalSecret.refreshInterval }}
  secretStoreRef:
    name: {{ .Values.externalSecret.secretStoreRef.name }}
    kind: {{ .Values.externalSecret.secretStoreRef.kind }}
  target:
    name: {{ .Values.externalSecret.targetSecretName }}
    creationPolicy: Owner
  data:
    - secretKey: {{ .Values.externalSecret.envKey }}
      remoteRef:
        key: {{ .Values.externalSecret.awsSecretPath }}
        property: {{ .Values.externalSecret.envKey }}
{{- end }}
