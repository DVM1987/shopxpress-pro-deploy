# Prd override — manual PR promotion from stg, requires devops review.

replicas: 0

externalSecret:
  awsSecretPath: /shopxpress-pro/prd/products

resources:
  requests:
    cpu: 200m
    memory: 256Mi
  limits:
    cpu: 1000m
    memory: 1Gi

strategy:
  rollingUpdate:
    maxSurge: 1
    maxUnavailable: 0

# Disable data layer features — AWS Secret shopxpress-pro/prd/products-db
# chưa tạo (data layer dev only ở Sub-comp 0.7.5b).
externalSecret:
  enabled: false
migration:
  enabled: false
