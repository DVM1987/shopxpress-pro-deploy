# Prd override — manual PR promotion from stg, requires devops review.

replicas: 3

externalSecret:
  awsSecretPath: /shopxpress-pro/prd/products

resources:
  requests:
    cpu: 200m
    memory: 256Mi
  limits:
    cpu: 1000m
    memory: 1Gi

strategy:
  rollingUpdate:
    maxSurge: 1
    maxUnavailable: 0
